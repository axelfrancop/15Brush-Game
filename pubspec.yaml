name: card_game_multiplayer
description: "A multiplayer card game built with Flutter, Flame and Firebase."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Game Engine
  flame: ^1.14.0

  # Firebase
  firebase_core: ^2.32.0
  cloud_firestore: ^4.17.0
  firebase_auth: ^4.16.0

  # State Management
  provider: ^6.1.0

  # Utilities
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
